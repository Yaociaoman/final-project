<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>登入 / 註冊</title>
        <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
        <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

            body {
                font-family: 'DM Sans', sans-serif;
                background: #f4f3f8;
                min-height: 100vh;
                display: flex;
                align-items: center;
                justify-content: center;
                padding: 2rem;
            }

            .card {
                display: flex;
                width: 100%;
                max-width: 860px;
                min-height: 520px;
                border-radius: 18px;
                overflow: hidden;
                box-shadow: 0 8px 40px rgba(0,0,0,0.12);
            }

    /* 左側裝飾 */
            .panel-left {
                width: 42%;
                background: linear-gradient(145deg, #1a1a2e 0%, #16213e 60%, #0f3460 100%);
                padding: 3rem 2.5rem;
                display: flex;
                flex-direction: column;
                justify-content: space-between;
            }
            .logo {
                width: 38px; height: 38px;
                background: #534AB7; border-radius: 10px;
                display: flex; align-items: center; justify-content: center;
                margin-bottom: 2rem;
            }
            .panel-left h1 {
                font-family: 'DM Serif Display', serif;
                font-size: 2.4rem; color: #e8e4f5;
                line-height: 1.2; font-style: italic;
            }
            .panel-left p { font-size: 0.88rem; color: #8b8ba8; margin-top: 0.8rem; line-height: 1.7; }
            .quote-box {
                background: rgba(255,255,255,0.06);
                border: 1px solid rgba(255,255,255,0.1);
                border-radius: 12px; padding: 1.2rem;
            }
            .quote-box p { font-size: 0.82rem; color: #AFA9EC; line-height: 1.7; }
            .quote-author { font-size: 0.75rem; color: #534AB7; font-weight: 500; margin-top: 0.6rem; }
            .dots { display: flex; gap: 8px; margin-top: 1rem; }
            .dot { width: 7px; height: 7px; border-radius: 50%; background: #534AB7; opacity: 0.35; }
            .dot.active { opacity: 1; background: #AFA9EC; }

    /* 右側表單 */
            .panel-right { flex: 1; background: #fff; padding: 2.8rem 3rem; display: flex; flex-direction: column; justify-content: center; }

            .tabs {
                display: flex; border: 1px solid #e5e3f0;
                border-radius: 10px; overflow: hidden; margin-bottom: 2rem;
            }
            .tab {
                flex: 1; padding: 0.6rem 1rem; font-size: 0.88rem;
                font-family: 'DM Sans', sans-serif; cursor: pointer;
                border: none; background: transparent; color: #888; transition: all 0.2s;
            }
            .tab.active { background: #f4f3f8; color: #1a1a2e; font-weight: 500; }

            .form-group { margin-bottom: 1.1rem; }
            .form-row { display: flex; gap: 12px; }
            .form-row .form-group { flex: 1; }
            .label-row { display: flex; justify-content: space-between; align-items: center; }

    label {
      display: block; font-size: 0.75rem; color: #666;
      margin-bottom: 0.4rem; font-weight: 500;
      letter-spacing: 0.05em; text-transform: uppercase;
    }

    input[type="text"], input[type="email"], input[type="password"] {
      width: 100%; padding: 0.65rem 0.9rem;
      border: 1px solid #ddd; border-radius: 9px;
      font-family: 'DM Sans', sans-serif; font-size: 0.9rem;
      color: #1a1a2e; background: #fff; outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    input:focus { border-color: #7F77DD; box-shadow: 0 0 0 3px rgba(127,119,221,0.15); }

    .forgot { font-size: 0.75rem; color: #7F77DD; cursor: pointer; text-decoration: none; }
    .forgot:hover { text-decoration: underline; }

    .strength-bars { display: flex; gap: 4px; margin-top: 5px; }
    .s-bar { height: 3px; flex: 1; border-radius: 2px; background: #e5e3f0; transition: background 0.3s; }
    .pw-hint { font-size: 0.72rem; color: #aaa; margin-top: 3px; }

    .btn-main {
      width: 100%; padding: 0.78rem;
      background: #534AB7; color: #fff; border: none;
      border-radius: 10px; font-family: 'DM Sans', sans-serif;
      font-size: 0.92rem; font-weight: 500; cursor: pointer;
      margin-top: 1rem; transition: background 0.2s, transform 0.1s;
    }
    .btn-main:hover { background: #3C3489; }
    .btn-main:active { transform: scale(0.99); }

    .divider { display: flex; align-items: center; gap: 0.75rem; margin: 1.2rem 0; color: #bbb; font-size: 0.78rem; }
    .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: #eee; }

    .social-row { display: flex; gap: 10px; }
    .btn-social {
      flex: 1; padding: 0.6rem 0.5rem;
      border: 1px solid #e0ddf0; border-radius: 9px;
      background: #fff; font-family: 'DM Sans', sans-serif;
      font-size: 0.82rem; color: #555; cursor: pointer;
      transition: background 0.15s; display: flex;
      align-items: center; justify-content: center; gap: 6px;
    }
    .btn-social:hover { background: #f4f3f8; }

    .hint { font-size: 0.78rem; color: #aaa; text-align: center; margin-top: 1.2rem; }
    .hint a { color: #7F77DD; cursor: pointer; }
    .hint a:hover { text-decoration: underline; }
    .hidden { display: none; }

    /* 手機版 */
    @media (max-width: 640px) {
      .card { flex-direction: column; }
      .panel-left { width: 100%; padding: 2rem 1.5rem; }
      .panel-right { padding: 2rem 1.5rem; }
      .form-row { flex-direction: column; gap: 0; }
    }
  </style>
</head>
<body>

<div class="card">

  <!-- 左側裝飾 -->
  <div class="panel-left">
    <div>
      <div class="logo">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
          <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
        </svg>
      </div>
      <h1>歡迎<br>回來</h1>
      <p>登入以繼續您的旅程，<br>或建立新帳號開始探索。</p>
    </div>
    <div>
      <div class="quote-box">
        <p>"簡潔的介面讓我每天登入都有好心情，設計真的很用心。"</p>
        <p class="quote-author">— 某位滿意的使用者</p>
      </div>
      <div class="dots">
        <div class="dot active"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>
    </div>
  </div>

  <!-- 右側表單 -->
  <div class="panel-right">
    <div class="tabs">
      <button class="tab active" id="tab-login" onclick="switchTab('login')">登入</button>
      <button class="tab" id="tab-register" onclick="switchTab('register')">註冊</button>
    </div>

    <!-- 登入表單 -->
    <div id="form-login">
      <div class="form-group">
        <label>電子郵件</label>
        <input type="email" id="login-email" placeholder="you@example.com" />
      </div>
      <div class="form-group">
        <div class="label-row">
          <label>密碼</label>
          <a class="forgot" onclick="alert('重設連結已寄出！')">忘記密碼？</a>
        </div>
        <input type="password" id="login-password" placeholder="••••••••" />
      </div>
      <button class="btn-main" onclick="handleLogin()">登入</button>
      <div class="divider">或</div>
      <div class="social-row">
        <button class="btn-social">Google 登入</button>
        <button class="btn-social">GitHub 登入</button>
      </div>
      <p class="hint">還沒有帳號？<a onclick="switchTab('register')">立即註冊</a></p>
    </div>

    <!-- 註冊表單 -->
    <div id="form-register" class="hidden">
      <div class="form-row">
        <div class="form-group">
          <label>姓名</label>
          <input type="text" id="reg-name" placeholder="王小明" />
        </div>
        <div class="form-group">
          <label>使用者名稱</label>
          <input type="text" id="reg-username" placeholder="user123" />
        </div>
      </div>
      <div class="form-group">
        <label>電子郵件</label>
        <input type="email" id="reg-email" placeholder="you@example.com" />
      </div>
      <div class="form-group">
        <label>密碼</label>
        <input type="password" id="reg-password" placeholder="至少 8 個字元"
               oninput="checkStrength(this.value)" />
        <div class="strength-bars">
          <div class="s-bar" id="s1"></div>
          <div class="s-bar" id="s2"></div>
          <div class="s-bar" id="s3"></div>
          <div class="s-bar" id="s4"></div>
        </div>
        <div class="pw-hint" id="pw-hint">請輸入密碼</div>
      </div>
      <button class="btn-main" onclick="handleRegister()">建立帳號</button>
      <p class="hint">已有帳號？<a onclick="switchTab('login')">立即登入</a></p>
    </div>

  </div>
</div>

<script>
  function switchTab(tab) {
    const isLogin = tab === 'login';
    document.getElementById('tab-login').classList.toggle('active', isLogin);
    document.getElementById('tab-register').classList.toggle('active', !isLogin);
    document.getElementById('form-login').classList.toggle('hidden', !isLogin);
    document.getElementById('form-register').classList.toggle('hidden', isLogin);
  }

  function checkStrength(value) {
    let score = 0;
    if (value.length >= 8)          score++;
    if (/[A-Z]/.test(value))        score++;
    if (/[0-9]/.test(value))        score++;
    if (/[^A-Za-z0-9]/.test(value)) score++;

    const colors = ['#F09595', '#EF9F27', '#97C459', '#1D9E75'];
    const labels = ['太弱', '還可以', '不錯', '非常強'];

    for (let i = 1; i <= 4; i++) {
      document.getElementById('s' + i).style.background =
        i <= score ? colors[score - 1] : '#e5e3f0';
    }
    document.getElementById('pw-hint').textContent =
      value.length ? (labels[score - 1] || '太弱') : '請輸入密碼';
  }

  function handleLogin() {
    const email    = document.getElementById('login-email').value.trim();
    const password = document.getElementById('login-password').value;
    if (!email || !password) { alert('請填寫電子郵件與密碼！'); return; }

    // TODO: 替換成真實 API
    // fetch('/api/login', { method:'POST', body: JSON.stringify({email, password}) })
    alert(`登入成功！帳號：${email}`);
  }

  function handleRegister() {
    const name     = document.getElementById('reg-name').value.trim();
    const username = document.getElementById('reg-username').value.trim();
    const email    = document.getElementById('reg-email').value.trim();
    const password = document.getElementById('reg-password').value;

    if (!name || !username || !email || !password) { alert('請填寫所有欄位！'); return; }
    if (password.length < 8) { alert('密碼至少需要 8 個字元！'); return; }

    // TODO: 替換成真實 API
    // fetch('/api/register', { method:'POST', body: JSON.stringify({name, username, email, password}) })
    alert(`帳號建立成功！歡迎，${name}！`);
  }
</script>

</body>
</html>
